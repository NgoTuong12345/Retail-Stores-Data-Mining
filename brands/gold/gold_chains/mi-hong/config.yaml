# brands/mi-hong/config.yaml
# Mi Hồng — regional gold chain (Southern Vietnam)
# COLLISION RISK: "Hồng" is a very common Vietnamese name.
# Regex anchors on "MI HỒNG" as a compound — less ambiguous than just "HỒNG".

slug: mi-hong
name: Mi Hồng
brand_regex: 'MI HỒNG|MI HONG'
spelling_variants:
  - 'MI HỒNG'
  - 'MI HONG'
  - 'VÀNG MI HỒNG'
  - 'VANG MI HONG'
  - 'VÀNG BẠC MI HỒNG'

seed_parent_msts:
  - '0304663538'

default_store_type: 'Mi Hồng Store'

classification:
  # National cross-brand Id->date curve instead of mi-hong's own masothue calibration
  # (suffix-axis capped at 'low' regardless of accuracy). See enrich.py GlobalDateInterpolator.
  date_calibration_force_global: true
  date_calibration_parent_mst: '0304663538'
  date_calibration_min_date: '2010-01-01'
  masothue_parent_url: 'https://masothue.com/0304663538-cong-ty-trach-nhiem-huu-han-mi-hong'
  corporate_keywords:
    - 'VĂN PHÒNG'
    - 'VPĐD'
    - 'VP ĐẠI DIỆN'
    - 'KHO '
    - 'VĂN PHÒNG ĐẠI DIỆN'
    - 'VAN PHONG'
    - 'VP DAI DIEN'
    - 'XUONG CHE TAC'
    - 'TRUNG TAM PHAN PHOI'
    - 'VAN PHONG DAI DIEN'
  # Generic BHX-shaped schema_export defaults assume BHX's own vocabulary
  # (CỬA HÀNG/KHO/ONLINE/FARM). This override adds jewelry-sector-safe
  # Warehouse/Services buckets (workshop, factory, appraisal lab) so those
  # don't fall into the catch-all 'Other' bucket; Retail keyword unchanged.
  schema_export:
    store_type_patterns:
      - ['Warehouse', '\bXƯỞNG\b|\bNHÀ MÁY\b|\bKHO\b']
      - ['Services', 'GIÁM ĐỊNH']
      - ['Retail', 'C[ỬU]A H[ÀA]NG']

store_type_rules:
  - ['ĐẠI LÝ|DAI LY', 'Mi Hồng Agent']
