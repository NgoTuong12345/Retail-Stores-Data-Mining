# Curated overlay for the unified brand master. One entry per brand slug.
# Net-new fields ONLY — name/spelling_variants come from config.yaml, and
# industry/subsector default from the brands/<cat>/<subcat>/<slug>/ path.
# See docs/archive/superpowers/specs/2026-07-08-unified-company-brand-master-design.md
#
# Fields:
#   slug                          - required; must match brands/**/<slug>/config.yaml
#   country_origin                - country name
#   domestic_foreign               - Domestic | Foreign
#   description                   - short business description
#   owner_msts                    - {mst: owner_legal_name} — structured VN owner names
#   website_slug                  - comp_website_scrapper/brands/<slug> link (nullable)
#   industry_override / subsector_override - only when the folder path is wrong

